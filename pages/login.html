<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/style.css">
    <title>Login | RedFinix</title>
</head>

<body data-base=".." class="bg-zinc-100 font-sans text-zinc-900">
    <div id="navbar"></div>

    <main class="mx-auto w-full max-w-[1120px] px-4 py-10 sm:px-6 md:py-12">
        <section
            class="card-hover mx-auto max-w-[1000px] overflow-hidden rounded-2xl border border-zinc-300 bg-gradient-to-br from-[#c20810] via-[#7a0007] to-[#3a0004] shadow-[0_8px_24px_rgba(0,0,0,0.16)]">
            <div class="grid items-center gap-10 px-5 py-10 sm:px-8 md:px-10 md:py-12 lg:grid-cols-2 lg:px-14 lg:py-16">
                <div class="mx-auto w-full max-w-[430px] text-white lg:order-1">
                    <h2 class="text-center text-3xl font-bold leading-tight sm:text-4xl lg:text-5xl">Login</h2>
                    <p class="mt-2 text-center text-sm text-white/90 sm:text-base">
                        Sign in your Redfinix Luxury Estates account
                    </p>

                    <form class="mt-7 space-y-5" action="#">
                        <label class="flex h-12 items-center gap-3 rounded-lg border border-white/40 px-4">
                            <img src="../assets/icons/login-email.svg" alt="" class="h-4 w-4 shrink-0" />
                            <input
                                class="w-full bg-transparent text-sm text-white outline-none placeholder:text-white/70"
                                type="email" placeholder="you@example.com" />
                        </label>

                        <label class="flex h-12 items-center gap-3 rounded-lg border border-white/40 px-4">
                            <img src="../assets/icons/login-lock.svg" alt="" class="h-4 w-4 shrink-0" />
                            <input
                                class="w-full bg-transparent text-sm text-white outline-none placeholder:text-white/70"
                                type="password" placeholder="Password" />
                        </label>

                        <div class="flex items-center justify-between gap-3 text-sm text-white/90">
                            <label class="inline-flex items-center gap-3">
                                <input type="checkbox"
                                    class="h-5 w-5 rounded border border-white/60 bg-transparent accent-red-500 focus:outline-none" />
                                <span>Remember me</span>
                            </label>
                            <a href="./contact.html" class="hover:text-white">Forgot password?</a>
                        </div>

                        <button
                            class="mt-1 inline-flex h-8 px-3 items-center justify-center rounded-full bg-red-600 text-xs font-medium text-white transition hover:bg-red-700"
                            style="width:110px;" type="submit">
                            Continue
                        </button>
                    </form>

                    <p class="mt-4 text-center text-sm text-white/90">Don&apos;t have an account?</p>
                    <a href="./register.html"
                        class="mt-1 block text-center text-lg font-medium text-red-600 hover:text-red-500">Sign Up</a>
                </div>

                <div class="hidden lg:flex lg:order-2 lg:justify-center">
                    <h1 class="text-center text-5xl font-extrabold tracking-tight text-white xl:text-6xl">
                        Welcome<br />Back!</h1>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>
    <script src="../js/main.js"></script>
</body>

</html>
