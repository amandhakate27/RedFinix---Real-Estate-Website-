<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/style.css">
    <title>Login | RedFinix</title>
</head>

<body data-base=".." class="bg-white font-sans text-zinc-900">
    <div id="navbar"></div>

    <main class="relative flex w-full flex-col justify-center px-4 py-10 sm:px-6 md:py-12 min-h-[calc(100vh-74px)] md:min-h-[calc(100vh-80px)]">
        <div class="absolute inset-0 bg-[url(../assets/images/Login%20Page.png)] bg-cover bg-center"></div>

        <section
            class="card-hover relative mx-auto w-full max-w-[480px] overflow-hidden rounded-2xl border border-white/20 bg-black/70 shadow-[0_8px_24px_rgba(0,0,0,0.35)]">
            <div class="px-5 py-10 sm:px-8 md:px-10 md:py-12">
                <div class="mx-auto w-full max-w-[380px] text-white">
                    <h2 class="text-center text-3xl font-bold leading-tight sm:text-4xl lg:text-5xl">Login</h2>
                    <p class="mt-2 text-center text-sm text-white/90 sm:text-base">
                        Sign in your Redfinix Luxury Estates account
                    </p>

                    <form class="mt-7 space-y-5" action="#">
                        <label class="flex h-12 items-center gap-3 rounded-lg border border-white/40 px-4">
                            <img src="../assets/icons/login-email.svg" alt="" class="h-4 w-4 shrink-0" />
                            <input
                                class="w-full bg-transparent text-sm text-white outline-none placeholder:text-white/70"
                                type="email" placeholder="you@example.com" />
                        </label>

                        <label class="flex h-12 items-center gap-3 rounded-lg border border-white/40 px-4">
                            <img src="../assets/icons/login-lock.svg" alt="" class="h-4 w-4 shrink-0" />
                            <input
                                class="w-full bg-transparent text-sm text-white outline-none placeholder:text-white/70"
                                type="password" placeholder="Password" />
                        </label>

                        <div class="flex items-center justify-between gap-3 text-sm text-white/90">
                            <label class="inline-flex items-center gap-3">
                                <input type="checkbox"
                                    class="h-5 w-5 rounded border border-white/60 bg-transparent accent-red-500 focus:outline-none" />
                                <span>Remember me</span>
                            </label>
                            <a href="javascript:void(0)" class="hover:text-white">Forgot password?</a>
                        </div>

                        <button
                            class="mt-1 inline-flex h-11 w-full items-center justify-center rounded-full bg-red-600 text-lg font-medium text-white transition hover:bg-red-700"
                            type="submit">
                            Continue
                        </button>
                    </form>

                    <p class="mt-4 text-center text-sm text-white/90">Don&apos;t have an account?</p>
                    <a href="./register.html"
                        class="mt-1 block text-center text-lg font-medium text-red-600 hover:text-red-500">Sign Up</a>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>
    <script src="../js/main.js"></script>
</body>

</html>
