<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/style.css">
    <title>Schedule Visit | RedFinix</title>
</head>

<body data-base=".." class="bg-zinc-100 font-sans text-zinc-900">
    <div id="navbar"></div>

    <main class="mx-auto max-w-[1120px] px-4 py-8 sm:px-6 md:py-10">
        <section class="card-hover rounded-2xl border border-zinc-300 bg-white shadow-[0_3px_10px_rgba(0,0,0,0.08)]">
            <div class="flex items-center justify-between border-b border-zinc-300 px-5 py-5 sm:px-8">
                <div class="inline-flex items-center gap-3">
                    <span class="text-2xl text-zinc-800">&#8592;</span>
                    <h1 class="text-2xl font-bold leading-tight sm:text-3xl">Schedule Property Viewing</h1>
                </div>
                <a href="../index.html" class="text-4xl leading-none text-zinc-900" aria-label="Close">
                    &times;
                </a>
            </div>

            <div class="border-b border-zinc-300 px-5 py-7 sm:px-8">
                <div class="grid grid-cols-2 gap-4 sm:grid-cols-4 sm:gap-3">
                    <div class="relative flex flex-col items-center">
                        <div
                            class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-red-600 text-white">
                            <img src="../assets/icons/schedule-property.svg" alt=""
                                class="h-4 w-4 brightness-0 invert" />
                        </div>
                        <p class="mt-2 text-sm font-semibold text-red-600">Property</p>
                        <span class="absolute left-[58%] top-5 hidden h-px w-[72%] bg-zinc-400 sm:block"></span>
                    </div>
                    <div class="relative flex flex-col items-center">
                        <div
                            class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-zinc-500 text-zinc-700">
                            <img src="../assets/icons/schedule-calendar.svg" alt="" class="h-4 w-4" />
                        </div>
                        <p class="mt-2 text-sm text-zinc-600">Date &amp; Time</p>
                        <span class="absolute left-[58%] top-5 hidden h-px w-[72%] bg-zinc-400 sm:block"></span>
                    </div>
                    <div class="relative flex flex-col items-center">
                        <div
                            class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-zinc-500 text-zinc-700">
                            <img src="../assets/icons/detail-user.svg" alt="" class="h-4 w-4" />
                        </div>
                        <p class="mt-2 text-sm text-zinc-600">Your Details</p>
                        <span class="absolute left-[58%] top-5 hidden h-px w-[72%] bg-zinc-400 sm:block"></span>
                    </div>
                    <div class="flex flex-col items-center">
                        <div
                            class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-zinc-500 text-zinc-700">
                            <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4" aria-hidden="true">
                                <path d="M5 12L10 17L19 8" stroke="currentColor" stroke-width="1.9"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <p class="mt-2 text-sm text-zinc-600">Confirmation</p>
                    </div>
                </div>
            </div>

            <div class="border-b border-zinc-300 px-5 py-7 sm:px-8">
                <h2 class="text-2xl font-semibold text-zinc-900 sm:text-3xl">Select a Property</h2>
                <p class="mt-2 text-sm text-zinc-500 sm:text-base">Choose the property you'd like to view</p>

                <div class="mt-6 grid items-stretch gap-4 lg:grid-cols-[74%_26%]">
                    <img id="schedule-img" src="../assets/images/hero-villa.png" alt="Modern Luxury Villa"
                        class="h-[250px] w-full rounded-3xl object-cover sm:h-[330px] lg:h-[350px]" />

                    <article
                        class="card-hover rounded-2xl border border-zinc-300 bg-white p-6 shadow-[0_6px_20px_rgba(0,0,0,0.12)] h-[250px] sm:h-[330px] lg:h-[350px] flex flex-col justify-center">
                        <h3 id="schedule-title" class="text-lg font-bold text-red-600 sm:text-xl">Modern Luxury Villa</h3>
                        <p class="mt-1 inline-flex items-center gap-2 text-sm text-zinc-700 sm:text-base">
                            <img src="../assets/icons/schedule-location.svg" alt="" class="h-5 w-5" />
                            <span id="schedule-location">Beverly Hills, CA</span>
                        </p>
                        <p id="schedule-price" class="mt-2 text-2xl font-semibold text-red-600 sm:text-3xl">&#8377; 4,500,000</p>
                    </article>
                </div>
            </div>

            <div class="flex flex-wrap items-center justify-between gap-4 px-5 py-5 sm:px-8">
                <a id="schedule-back-btn" href="./show-property.html"
                    class="inline-flex items-center gap-2 text-sm text-zinc-600 hover:text-zinc-900 sm:text-base">
                    <span class="text-xl">&#8592;</span>
                    Back
                </a>

                <p class="text-base text-zinc-600">Step 1 of 4</p>

                <a href="./schedule-view.html"
                    class="inline-flex h-11 min-w-[140px] items-center justify-center gap-2 rounded-full bg-red-600 px-6 text-sm font-medium text-white transition hover:bg-red-700 sm:text-base">
                    Next
                    <span>&#8594;</span>
                </a>
            </div>
        </section>
    </main>

    <div id="footer"></div>
    <script src="../js/main.js"></script>
</body>

</html>
