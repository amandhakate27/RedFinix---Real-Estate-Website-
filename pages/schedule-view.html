<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/style.css">
    <title>Schedule a Viewing | RedFinix</title>
</head>

<body data-base=".." class="bg-zinc-100 font-sans text-zinc-900">
    <div id="navbar"></div>

    <main class="mx-auto max-w-[1100px] px-4 py-8 sm:px-6 md:py-10">
        <a href="./show-property.html"
            class="inline-flex items-center gap-2 text-lg font-semibold text-zinc-900 hover:text-red-600 sm:text-xl">
            <span class="text-2xl">&#8592;</span>
            Back to Property
        </a>

        <section class="mt-7 text-center">
            <h1 class="text-3xl font-bold sm:text-4xl">Schedule a Viewing</h1>
            <p class="mt-2 text-sm text-zinc-600 sm:text-base">Book an appointment to view Modern Family House</p>
        </section>

        <section class="card-hover mt-7 rounded-2xl border border-zinc-200 bg-zinc-200 p-4 shadow-sm sm:p-6">
            <div class="grid gap-5 md:gap-10 md:grid-cols-[230px_1fr] md:items-center">
                <img src="../assets/images/schedule-property-raw.png" alt="Birla Punya"
                    class="h-48 w-full rounded-2xl object-cover sm:h-56 md:h-52 " />

                <div>
                    <h2 class="text-2xl font-bold text-red-600 sm:text-3xl">Birla Punya</h2>
                    <p class="mt-2 inline-flex items-center gap-2 text-base text-zinc-600 sm:text-lg">
                        <img src="../assets/icons/sv-location.svg" alt="" class="h-5 w-5" />
                        Sangamwadi
                    </p>
                    <div class="mt-3 flex flex-wrap items-center gap-x-5 gap-y-2 text-sm text-zinc-600 sm:text-base">
                        <span class="inline-flex items-center gap-2"><img src="../assets/icons/sv-bed.svg" alt=""
                                class="h-5 w-5" />3 Beds</span>
                        <span class="inline-flex items-center gap-2"><img src="../assets/icons/sv-bath.svg" alt=""
                                class="h-5 w-5" />3 Baths</span>
                        <span class="inline-flex items-center gap-2"><img src="../assets/icons/sv-area.svg" alt=""
                                class="h-5 w-5" />3,500 sqft</span>
                    </div>
                </div>
            </div>
        </section>

        <section
            class="card-hover mt-5 rounded-2xl border border-zinc-200 bg-zinc-200 p-5 pb-10 shadow-sm sm:p-7 sm:pb-12">
            <h2 class="text-2xl font-semibold text-red-600 sm:text-3xl">Your Information</h2>

            <form class="mt-5 space-y-4" action="#">
                <div class="grid gap-4 md:grid-cols-2">
                    <label class="space-y-2">
                        <span class="text-sm font-semibold text-zinc-900 sm:text-base">First Name *</span>
                        <span class="flex h-12 items-center gap-3 rounded-lg border border-zinc-400 bg-white px-3">
                            <img src="../assets/icons/sv-user.svg" alt="" class="h-4 w-4" />
                            <input type="text" placeholder="First Name"
                                class="w-full bg-transparent text-sm text-zinc-700 outline-none placeholder:text-zinc-500 sm:text-base" />
                        </span>
                    </label>

                    <label class="space-y-2">
                        <span class="text-sm font-semibold text-zinc-900 sm:text-base">Last Name *</span>
                        <span class="flex h-12 items-center gap-3 rounded-lg border border-zinc-400 bg-white px-3">
                            <img src="../assets/icons/sv-user.svg" alt="" class="h-4 w-4" />
                            <input type="text" placeholder="Last Name"
                                class="w-full bg-transparent text-sm text-zinc-700 outline-none placeholder:text-zinc-500 sm:text-base" />
                        </span>
                    </label>
                </div>

                <div class="grid gap-4 md:grid-cols-2">
                    <label class="space-y-2">
                        <span class="text-sm font-semibold text-zinc-900 sm:text-base">Email Address *</span>
                        <span class="flex h-12 items-center gap-3 rounded-lg border border-zinc-400 bg-white px-3">
                            <img src="../assets/icons/sv-email.svg" alt="" class="h-4 w-4" />
                            <input type="email" placeholder="Email Address"
                                class="w-full bg-transparent text-sm text-zinc-700 outline-none placeholder:text-zinc-500 sm:text-base" />
                        </span>
                    </label>

                    <label class="space-y-2">
                        <span class="text-sm font-semibold text-zinc-900 sm:text-base">Phone Number *</span>
                        <span class="flex h-12 items-center gap-3 rounded-lg border border-zinc-400 bg-white px-3">
                            <img src="../assets/icons/sv-phone.svg" alt="" class="h-4 w-4" />
                            <input type="tel" placeholder="+91"
                                class="w-full bg-transparent text-sm text-zinc-700 outline-none placeholder:text-zinc-500 sm:text-base" />
                        </span>
                    </label>
                </div>

                <label class="block space-y-2">
                    <span class="inline-flex items-center gap-2 text-sm font-semibold text-zinc-900 sm:text-base">
                        <img src="../assets/icons/sv-calendar.svg" alt="" class="h-4 w-4" />
                        Select Date
                    </span>
                    <span class="flex h-12 items-center gap-3 rounded-lg border border-zinc-400 bg-white px-3">
                        <input type="text" placeholder="dd-mm-yyyy"
                            class="w-full bg-transparent text-sm text-zinc-700 outline-none placeholder:text-zinc-500 sm:text-base" />
                    </span>
                </label>

                <div>
                    <p class="inline-flex items-center gap-2 text-sm font-semibold text-zinc-900 sm:text-base">
                        <img src="../assets/icons/sv-clock.svg" alt="" class="h-4 w-4" />
                        Select Time Slot
                    </p>
                    <div class="mt-3 grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-5">
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">9:00
                            AM</button>
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">10:00
                            AM</button>
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">11:00
                            AM</button>
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">12:00
                            AM</button>
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">1:00
                            AM</button>
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">2:00
                            AM</button>
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">3:00
                            AM</button>
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">4:00
                            AM</button>
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">5:00
                            AM</button>
                        <button type="button"
                            class="h-12 rounded-lg border border-zinc-400 bg-white text-sm text-zinc-700 sm:text-base">6:00
                            AM</button>
                    </div>
                </div>

                <label class="block mb-8">
                    <span class="text-sm font-semibold text-zinc-900 sm:text-base">Additional Message (Optional)</span>
                    <span class="mt-4 flex items-start gap-3 rounded-lg border border-zinc-400 bg-white px-3 py-3">
                        <img src="../assets/icons/sv-message.svg" alt="" class="mt-1 h-4 w-4" />
                        <textarea rows="3" placeholder="Any specific questions or requirements..."
                            class="w-full resize-none bg-transparent text-sm text-zinc-700 outline-none placeholder:text-zinc-500 sm:text-base"></textarea>
                    </span>
                </label>
            </form>
        </section>

        <div class="mt-6 flex justify-center">
            <a href="./schedule-confirmation.html"
                class="inline-flex h-12 min-w-[260px] items-center justify-center gap-2 rounded-full bg-red-400 px-8 text-base font-medium text-white transition hover:bg-red-500 sm:text-lg">
                <img src="../assets/icons/sv-check.svg" alt="" class="h-3.5 w-4" />
                Confirm Booking
            </a>
        </div>
    </main>

    <div id="footer"></div>
    <script src="../js/main.js"></script>
</body>

</html>
