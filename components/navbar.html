<header
  class="sticky top-0 z-50 w-full border-b border-zinc-300/80 bg-white/85 backdrop-blur-md supports-[backdrop-filter]:bg-white/75">
  <nav class="relative flex min-h-[74px] w-full items-stretch md:min-h-[80px]">
    <a class="flex basis-[132px] items-center justify-center border-r border-zinc-300 px-2 py-2 sm:basis-[148px] md:basis-[166px]"
      href="#" data-route="home" aria-label="RedFinix home">
      <img data-asset="assets/images/logo.png" src="./assets/images/logo.png" alt="RedFinix Logo"
        class="w-full max-w-[104px] object-contain sm:max-w-[116px] md:max-w-[132px]" />
    </a>

    <button
      class="my-auto ml-auto mr-4 inline-flex h-11 w-11 flex-col items-center justify-center gap-1.5 rounded-lg border border-zinc-300 lg:hidden"
      type="button" data-nav-toggle aria-controls="rf-nav-menu" aria-expanded="false" aria-label="Toggle navigation">
      <span class="h-0.5 w-4.5 rounded-full bg-zinc-900"></span>
      <span class="h-0.5 w-4.5 rounded-full bg-zinc-900"></span>
      <span class="h-0.5 w-4.5 rounded-full bg-zinc-900"></span>
    </button>

    <div
      class="hidden absolute left-0 top-full z-40 flex w-full max-h-[calc(100vh-74px)] flex-col gap-5 overflow-y-auto border-t border-zinc-200 bg-white/95 px-5 py-5 shadow-lg backdrop-blur-md lg:static lg:relative lg:z-auto lg:flex lg:max-h-none lg:flex-1 lg:flex-row lg:items-center lg:justify-between lg:overflow-visible lg:border-t-0 lg:bg-transparent lg:px-6 lg:py-0 lg:shadow-none lg:backdrop-blur-0"
      id="rf-nav-menu" data-nav>
      <ul
        class="flex flex-col items-center gap-3 text-center text-[1.02rem] font-medium text-zinc-900 lg:mx-auto lg:flex-row lg:items-center lg:justify-center lg:gap-7 lg:text-[1rem] xl:gap-9 xl:text-[1.05rem] lg:flex-1">
        <li><a class="nav-link" href="#" data-route="home">Home</a>
        </li>
        <li><a class="nav-link" href="#" data-route="about">About</a>
        </li>
        <li><a class="nav-link" href="#" data-route="contact">Contact</a></li>
        <li><a class="nav-link" href="#" data-route="properties">Properties</a></li>
        <li><a class="nav-link" href="#" data-route="schedule">Schedule</a></li>
      </ul>

      <div
        class="flex flex-col items-center gap-4 lg:ml-auto lg:min-w-[420px] lg:flex-none lg:flex-row lg:items-center lg:justify-end lg:gap-3 xl:min-w-[500px] xl:gap-4">
        <label
          class="flex h-9 w-full max-w-[260px] items-center rounded-full bg-zinc-200 px-4 lg:w-[220px] xl:w-[280px] 2xl:w-[320px]"
          aria-label="Search property">
          <input class="w-full bg-transparent text-sm text-zinc-700 outline-none" type="search" placeholder="Search" />
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="#FC0000" stroke-opacity="0.58" stroke-width="2"></circle>
            <path d="M16.5 16.5L21 21" stroke="#FC0000" stroke-opacity="0.58" stroke-width="2" stroke-linecap="round">
            </path>
          </svg>
        </label>

        <img data-asset="assets/icons/nav-user.svg" src="./assets/icons/nav-user.svg" alt="User"
          class="hidden h-5 w-5 lg:block" />

        <div
          class="flex min-w-27.5 flex-col items-center gap-1 lg:flex-col lg:items-start lg:gap-0 lg:border-l lg:border-zinc-500 lg:pl-4 lg:leading-tight">
          <a class="whitespace-nowrap text-[0.95rem] font-medium text-zinc-800 transition hover:text-red-500" href="#"
            data-route="register">Sign&nbsp;Up</a>
          <a class="whitespace-nowrap text-[0.95rem] font-medium text-zinc-800 transition hover:text-red-500" href="#"
            data-route="login">Login</a>
        </div>
      </div>
    </div>
  </nav>
</header>
